<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大頭闖關 BigHead Run</title>
<style>
  :root{
    --sky-top:#ffd6a5; --sky-mid:#ff9e7d; --sky-bot:#a06cd5;
    --ground:#6b4226; --ground-top:#8fbf5f; --brick:#c97b4a;
    --coin:#ffd93d; --ink:#241734; --panel:rgba(36,23,52,.82);
    --accent:#ff5c8a; --accent2:#3ddc97; --paper:#fff4e6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#1a1026;font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif}
  #wrap{position:fixed;inset:0}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;image-rendering:auto;touch-action:none}

  /* 頂部資訊列 HUD */
  #hud{position:fixed;top:0;left:0;right:0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
       padding:10px 14px calc(10px + env(safe-area-inset-top,0px));color:var(--paper);font-weight:bold;
       pointer-events:none;text-shadow:0 2px 0 rgba(0,0,0,.35);z-index:5}
  .stat{display:flex;align-items:center;gap:6px;background:var(--panel);
        padding:6px 12px;border-radius:999px;font-size:15px;backdrop-filter:blur(4px)}
  .stat b{color:var(--coin)}
  #spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:999px;touch-action:manipulation;
       font-weight:bold;font-family:inherit;padding:8px 14px;font-size:14px;color:#fff;
       background:var(--accent);box-shadow:0 3px 0 #b8345e;transition:transform .05s;white-space:nowrap}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #b8345e}
  .btn.alt{background:#5a4a78;box-shadow:0 3px 0 #3a2e52}
  .btn.alt:active{box-shadow:0 1px 0 #3a2e52}
  /* 窄螢幕（手機）：精簡 HUD，按鈕只留圖示 */
  @media (max-width:600px){
    #hud{gap:6px;padding:8px 10px calc(8px + env(safe-area-inset-top,0px));justify-content:flex-end}
    #spacer{display:none}
    .stat{padding:5px 9px;font-size:13px;gap:3px}
    .btn{padding:8px 11px;font-size:15px;box-shadow:0 2px 0 #b8345e}
    .btn.alt{box-shadow:0 2px 0 #3a2e52}
    .btn .lbl{display:none}      /* 只顯示 emoji 圖示 */
  }

  /* 覆蓋層 overlay：開始 / 通關 / 失敗 */
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
           justify-content:center;gap:18px;text-align:center;color:var(--paper);
           background:radial-gradient(circle at 50% 30%,rgba(160,108,213,.35),rgba(26,16,38,.92));
           backdrop-filter:blur(6px);z-index:10;padding:24px}
  #overlay.hidden{display:none}
  #overlay h1{font-size:clamp(34px,9vw,72px);letter-spacing:1px;
              background:linear-gradient(180deg,#fff4e6,var(--coin));
              -webkit-background-clip:text;background-clip:text;color:transparent;
              filter:drop-shadow(0 4px 0 rgba(0,0,0,.3));line-height:1}
  #overlay .sub{font-size:clamp(13px,3.4vw,17px);opacity:.92;max-width:520px;line-height:1.6}
  #overlay .keys{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;opacity:.9;font-size:13px}
  .key{background:var(--panel);border:1px solid rgba(255,255,255,.15);
       padding:5px 11px;border-radius:8px;min-width:34px}
  #overlay .big{font-size:18px;padding:14px 30px;border-radius:14px;box-shadow:0 5px 0 #b8345e}
  #overlay .big:active{box-shadow:0 2px 0 #b8345e}
  .titleface{width:104px;height:104px;border-radius:22px;border:4px solid var(--paper);
             box-shadow:0 6px 0 rgba(0,0,0,.25);object-fit:contain;background:rgba(255,255,255,.12)}

  /* 手機觸控鍵 */
  #touch{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;
         padding:16px 20px calc(16px + env(safe-area-inset-bottom));pointer-events:none;z-index:6}
  #touch .pad{display:flex;gap:16px;pointer-events:auto}
  .tbtn{width:74px;height:74px;border-radius:50%;border:none;font-size:28px;color:#fff;
        background:var(--panel);box-shadow:0 4px 0 rgba(0,0,0,.4);
        display:flex;align-items:center;justify-content:center;
        user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
        touch-action:none;-webkit-tap-highlight-color:transparent}
  .tbtn.jump{width:92px;height:92px;background:var(--accent);box-shadow:0 4px 0 #b8345e;font-size:32px}
  .tbtn:active{transform:translateY(3px)}
  @media (pointer:coarse){#touch{display:flex}}

  .hint{font-size:12px;opacity:.7;margin-top:-6px}
  input[type=file]{display:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud">
  <div class="stat">關 <b id="lv">1/3</b></div>
  <div class="stat">🎫 詞元 <b id="coins">0</b></div>
  <div class="stat">⭐ <span id="score">0</span></div>
  <div class="stat">❤️ <span id="lives">3</span></div>
  <div id="spacer"></div>
  <button class="btn" id="uploadBtn">📷<span class="lbl"> 換人頭</span></button>
  <button class="btn" id="faceBtn">😜<span class="lbl"> 換表情</span></button>
  <button class="btn alt" id="shotBtn">📸<span class="lbl"> 截圖</span></button>
  <button class="btn alt" id="soundBtn">🔊</button>
  <button class="btn alt" id="musicBtn">🎵</button>
  <button class="btn alt" id="resetBtn">↻<span class="lbl"> 重來</span></button>
</div>

<div id="overlay">
  <img id="titleFace" class="titleface" alt="">
  <h1>大頭闖關 · AI 養成</h1>
  <div class="sub">
    收集<b>詞元 Token</b>、踩掉 Bug、避開<b>幻覺</b>，闖過<b>資料 → 訓練 → 上線</b>三關，養成你的 AI！<br>
    （按「換人頭」可把主角換成你朋友的臉 😆）
  </div>
  <div id="menuTip" class="sub" style="background:rgba(255,255,255,.08);border:1px dashed var(--coin);border-radius:12px;padding:10px 14px;max-width:500px;margin-top:4px"></div>
  <div class="keys">
    <span class="key">← →</span><span>移動</span>
    <span class="key">空白 / ↑</span><span>跳躍</span>
    <span class="key">手機</span><span>下方按鈕</span>
  </div>
  <button class="btn big" id="startBtn">開始養成 ▶</button>
  <div class="hint">踩怪頭頂打倒牠、正面撞到扣血；尖刺與會飛的幻覺要閃開</div>
</div>

<div id="touch">
  <div class="pad">
    <button class="tbtn" data-k="left">◀</button>
    <button class="tbtn" data-k="right">▶</button>
  </div>
  <div class="pad">
    <button class="tbtn jump" data-k="jump">▲</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");

  // ---- 顯示縮放（滿版自適應）----
  // 固定世界「高度」VH，讓垂直構圖在各裝置一致；可見「寬度」VW 依螢幕比例計算，
  // 畫布永遠填滿整個螢幕、不留黑邊、像素不變形（橫向看得寬、直向看得窄但完整）。
  let VW = 900;
  const VH = 520;
  let scale = 1;
  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    VW = Math.round(VH * w / h);          // 依比例決定可見寬度
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    scale = (h * dpr) / VH;               // 每世界單位的像素數（= w*dpr/VW，正方形像素）
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", ()=>setTimeout(resize,120));

  // ---- 關卡定義（AI 主題三關，難度遞增）----
  const T = 40; // 磚塊單位
  const GROUND_Y = VH - 80;
  const GY = GROUND_Y;

  // 執行期關卡狀態（由 loadLevel 填入）
  let LEVEL_W=4300, gaps=[], platforms=[], movers=[], spikes=[], coins=[], enemies=[], goal={x:0,y:GY};
  let levelIndex=0, levelName="", levelConcept="", levelStartFrame=0;
  function isGap(x){ return gaps.some(g => x > g[0] && x < g[1]); }

  // 三關：資料收集 → 模型訓練 → 推理上線
  const LEVELS = [
    { name:"第 1 關 · 資料收集", concept:"AI 靠『吃』大量資料學習。沿路收集詞元 Token，餵飽你的模型！",
      len:4300, goalX:4120,
      gaps:[[1150,1290],[2550,2700],[3550,3690]],
      platforms:[{x:480,y:GY-120,w:120},{x:700,y:GY-200,w:110},{x:1070,y:GY-140,w:210},
                 {x:1550,y:GY-120,w:120},{x:1820,y:GY-210,w:120},{x:2470,y:GY-150,w:250},
                 {x:2950,y:GY-130,w:120},{x:3180,y:GY-220,w:120},{x:3500,y:GY-150,w:240},{x:3950,y:GY-130,w:120}],
      movers:[], spikes:[],
      enemies:[{x:600,min:540,max:860,vx:1.3},{x:1650,min:1520,max:1900,vx:1.5},
               {x:2980,min:2900,max:3170,vx:1.4},{x:3980,min:3900,max:4090,vx:1.6}] },

    { name:"第 2 關 · 模型訓練", concept:"訓練＝不停調整幾千億個『參數』。平台會動，抓準節奏跳上去！",
      len:5000, goalX:4820,
      gaps:[[880,1090],[1880,2120],[2880,3120],[3880,4090]],
      platforms:[{x:560,y:GY-150,w:110},{x:1500,y:GY-160,w:120},{x:2500,y:GY-180,w:120},{x:3500,y:GY-160,w:120}],
      movers:[{x0:880,y0:GY-120,w:120,axis:"x",amp:95,speed:0.030,phase:0},
              {x0:1980,y0:GY-130,w:115,axis:"y",amp:75,speed:0.036,phase:1},
              {x0:2980,y0:GY-120,w:120,axis:"x",amp:95,speed:0.032,phase:0},
              {x0:3980,y0:GY-130,w:115,axis:"y",amp:75,speed:0.038,phase:2}],
      spikes:[{x:1300,w:80},{x:3300,w:80}],
      enemies:[{x:680,min:600,max:840,vx:1.7},{x:1560,min:1460,max:1740,vx:1.8},
               {x:2560,min:2440,max:2760,vx:1.7},{x:3560,min:3460,max:3760,vx:1.9},
               {x:4400,min:4300,max:4620,vx:1.8}] },

    { name:"第 3 關 · 推理上線", concept:"模型上線啦！要面對使用者，還有亂講話的『幻覺』。小心會飛的幻覺怪！",
      len:5500, goalX:5300,
      gaps:[[800,1010],[1700,1930],[2600,2830],[3500,3730],[4300,4490]],
      platforms:[{x:520,y:GY-160,w:100},{x:1300,y:GY-150,w:110},{x:2200,y:GY-170,w:110},
                 {x:3100,y:GY-160,w:110},{x:4000,y:GY-170,w:110}],
      movers:[{x0:800,y0:GY-110,w:100,axis:"x",amp:90,speed:0.036,phase:0},
              {x0:1790,y0:GY-120,w:100,axis:"y",amp:85,speed:0.042,phase:0},
              {x0:2690,y0:GY-110,w:100,axis:"x",amp:100,speed:0.040,phase:1},
              {x0:3590,y0:GY-120,w:100,axis:"y",amp:95,speed:0.046,phase:0},
              {x0:4370,y0:GY-110,w:100,axis:"x",amp:90,speed:0.042,phase:2}],
      spikes:[{x:1150,w:90},{x:2050,w:90},{x:3000,w:90},{x:4080,w:80}],
      enemies:[{x:1300,min:1200,max:1500,vx:1.9,type:"walk"},{x:2200,min:2100,max:2400,vx:2.0,type:"walk"},
               {x:1600,min:1480,max:1860,vx:1.7,type:"fly",y:GY-150},
               {x:3300,min:3180,max:3600,vx:2.1,type:"walk"},
               {x:3680,min:3560,max:3920,vx:1.8,type:"fly",y:GY-160},
               {x:4650,min:4520,max:4880,vx:2.0,type:"walk"}] }
  ];

  function loadLevel(i){
    levelIndex=i;
    const L=LEVELS[i];
    LEVEL_W=L.len; gaps=L.gaps; platforms=L.platforms; spikes=L.spikes||[];
    movers=(L.movers||[]).map(m=>({...m,x:m.x0,y:m.y0,px:m.x0,py:m.y0,dx:0,dy:0}));
    goal={x:L.goalX,y:GY};
    levelName=L.name; levelConcept=L.concept; levelStartFrame=t;
    seedCoinsForLevel(L); seedEnemiesForLevel(L);
    coinCount=0;
  }
  function seedCoinsForLevel(L){
    coins=[];
    const add=(x,y)=>coins.push({x,y,got:false,t:Math.random()*6});
    L.platforms.forEach(p=>{ for(let i=0;i<3;i++) add(p.x+24+i*38, p.y-44); });
    (L.movers||[]).forEach(m=>{ add(m.x0,m.y0-44); add(m.x0+38,m.y0-44); });
    for(let x=280;x<L.len-260;x+=240){
      if(gaps.some(g=>x>g[0]-20&&x<g[1]+20)) continue;
      if((L.spikes||[]).some(s=>x>s.x-34&&x<s.x+s.w+34)) continue;
      add(x,GY-46); add(x+38,GY-86);
    }
  }
  function seedEnemiesForLevel(L){
    enemies=(L.enemies||[]).map(e=>({
      x:e.x,min:e.min,max:e.max,vx:e.vx,type:e.type||"walk",
      y: e.type==="fly" ? e.y : GY-34,
      w: e.type==="fly"?34:36, h:34,
      alive:true,dead:0,wob:Math.random()*6
    }));
  }

  // ---- AI 知識小貼士（原創、12 歲看得懂、勾起好奇心）----
  const TIPS = [
    "AI 看不懂『字』，牠把每個字拆成『詞元 Token』再換成一串數字——你打的字，對牠來說其實是一堆數字！",
    "ChatGPT、Claude、Gemini、DeepSeek 其實都在做同一件事：猜下一個字。牠們是世界最強的『文字接龍高手』。",
    "為什麼 AI 有時一本正經地亂講？這叫『幻覺 Hallucination』——牠太想回答，就編了個聽起來很合理的答案。重要的事要查證！",
    "AI 的『大腦』裡有幾千億個『參數』，像幾千億顆小旋鈕；訓練就是慢慢把每顆轉到對的位置。",
    "Transformer 有個招式叫『注意力 Attention』，讓 AI 讀句子時知道哪些字最關鍵——跟你打王者要盯關鍵團戰一樣。",
    "想讓 AI 答得好？給清楚的指令＋例子＋叫牠『一步一步想』，效果差超多。這門功夫叫『提示工程 Prompt Engineering』。",
    "Claude 是 Anthropic 做的、ChatGPT 是 OpenAI、Gemini 是 Google、DeepSeek 來自中國——牠們是不同公司的『選手』。",
    "AI 也有『記憶上限』叫『上下文視窗 Context Window』，聊太長牠會忘了前面——像背包格子有限。",
    "DeepSeek 走『開源』路線，誰都能下載研究；有些模型是『閉源』，只能透過 API 使用。各有玩法。",
    "AI 其實不會算數，牠是用『猜』的，所以複雜計算最好叫牠寫程式或用計算工具。",
    "AlphaGo 用 AI 打敗了世界圍棋冠軍——這跟你鑽研英雄出裝、找最優解，是同一種『學習』。",
    "訓練一個大模型要用上萬張 GPU 算好幾週，電費貴到嚇人——所以才叫『大』模型。",
    "AI 有『知識截止日』，那天之後發生的事牠原本不知道，要靠『上網搜尋』才補得到。",
    "同個問題問兩次，答案可能不一樣，因為回答帶一點『隨機性 Temperature』，像擲骰子挑下一個詞。",
    "『多模態 Multimodal』AI 不只看文字，還能看圖、聽聲音、甚至看影片——眼睛耳朵都長齊了。",
    "AI 會很有自信地說錯話。聰明用法：把牠當超強助手，但關鍵答案自己再確認一次。",
    "『微調 Fine-tuning』＝拿一個已經很聰明的模型，再針對某專長補課，把牠練成專家。",
    "你問 AI 問題叫『推理 Inference』，牠學習的過程叫『訓練 Training』——一個像考試，一個像讀書。",
    "AI 的能力很多是『練出來、不是寫出來』的——沒人手動教牠每個答案，是牠自己從資料裡學會的。",
    "把問題講清楚、給背景、說你要什麼格式，AI 的回答品質會大躍進。會問問題，比會用工具更重要。"
  ];
  let tipIdx = Math.floor(Math.random()*TIPS.length);
  function nextTip(){ tipIdx = (tipIdx + 1 + Math.floor(Math.random()*(TIPS.length-1))) % TIPS.length; return TIPS[tipIdx]; }
  function curTip(){ return TIPS[tipIdx]; }

  // ---- 玩家 ----
  const player = {
    x:80, y:GROUND_Y-60, w:34, h:54, vx:0, vy:0,
    onGround:false, face:1, alive:true, win:false, blink:0, walk:0, rideMover:null
  };

  // ---- 狀態 ----
  let state = "menu"; // menu | play | dying | winning | levelclear | win | dead
  let coinCount = 0, lives = 3, camX = 0, t = 0;
  let totalScore = 0, bestScore = 0;
  try{ bestScore = parseInt(localStorage.getItem("bighead_best")||"0")||0; }catch(e){}
  const keys = {left:false, right:false, jump:false, jumpHeld:false};
  let faceIndex = 0;          // 內建表情索引（headImg 存在時優先用上傳圖）
  let particles = [];         // 粒子特效
  let muted = false;          // 音效開關
  let musicOn = true;         // 背景音樂開關
  let fx = null;              // 過場動畫狀態（死亡 / 過關）
  let flyHead = null;         // 死亡時彈飛的頭
  let lastReward = "";        // 本次過關獎勵

  // ---- 音效系統（Web Audio 合成，全原創）----
  let actx = null;
  function audioCtx(){
    if(!actx){ const AC = window.AudioContext || window.webkitAudioContext; if(AC) actx = new AC(); }
    if(actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(freq, dur, type, vol, slideTo){
    if(muted) return;
    const ac = audioCtx(); if(!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || "square"; o.frequency.value = freq;
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  }
  const sfx = {
    jump:  ()=> tone(420, 0.16, "square", 0.16, 760),
    coin:  ()=>{ tone(880,0.07,"square",0.15); setTimeout(()=>tone(1320,0.12,"square",0.15),60); },
    stomp: ()=> tone(180, 0.18, "sawtooth", 0.2, 60),
    hurt:  ()=>{ tone(300,0.18,"sawtooth",0.2,90); setTimeout(()=>tone(160,0.25,"sawtooth",0.18,50),120); },
    win:   ()=>{ const n=[523,659,784,1047]; n.forEach((f,i)=>setTimeout(()=>tone(f,0.22,"triangle",0.18),i*140)); },
    swap:  ()=> tone(660, 0.12, "triangle", 0.16, 990),
    // ── 新增惡搞音效 ──
    boing: ()=>{ tone(200,0.18,"sine",0.22,900); setTimeout(()=>tone(900,0.22,"sine",0.18,180),120); }, // 頭彈飛
    sadTrombone: ()=>{ const n=[330,294,262,196]; n.forEach((f,i)=>setTimeout(()=>tone(f,0.34,"sawtooth",0.16,f*0.94),i*230)); }, // 悲傷小號
    sticker: ()=> tone(1200,0.05,"square",0.2,300),      // 貼紙啪
    fanfare: ()=>{ const n=[523,523,523,523,659,784,1047]; const d=[.12,.12,.12,.2,.2,.2,.4];
                   let acc=0; n.forEach((f,i)=>{ setTimeout(()=>tone(f,d[i]+0.05,"square",0.18),acc*1000); acc+=d[i]; }); }, // 勝利號角
    stamp: ()=>{ tone(120,0.12,"sawtooth",0.28,60); setTimeout(()=>tone(80,0.16,"sawtooth",0.2,40),60); }, // 印章砸下
    firework: ()=>{ tone(1500,0.05,"square",0.12,400); setTimeout(()=>{ for(let i=0;i<5;i++) setTimeout(()=>tone(800+Math.random()*1200,0.06,"square",0.08),i*40); },80); } // 煙火
  };

  // ---- 背景音樂（原創旋律，循環）----
  // 一段歡樂的原創 8-bit 風主旋律 + 低音，純程式合成
  const MUSIC = {
    bpm: 138,
    // 主旋律（每格一個八分音符，0 = 休止）；頻率 Hz
    mel: [523,659,784,659, 587,784,698,587, 659,880,784,659, 784,659,523,0,
          587,698,880,698, 659,880,784,659, 523,659,784,1047, 988,784,659,0],
    // 低音（每兩格一個音）
    bass:[131,0,196,0, 147,0,196,0, 165,0,196,0, 196,0,131,0,
          147,0,196,0, 165,0,196,0, 131,0,196,0, 196,0,196,0]
  };
  let musicTimer = null, musicStep = 0;
  function musicNote(freq, dur, type, vol){
    if(!musicOn) return;
    const ac = audioCtx(); if(!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  }
  function startMusic(){
    if(musicTimer || !musicOn) return;
    audioCtx();
    const stepMs = 60000 / MUSIC.bpm / 2;   // 八分音符
    musicStep = 0;
    musicTimer = setInterval(()=>{
      const m = MUSIC.mel[musicStep % MUSIC.mel.length];
      const b = MUSIC.bass[musicStep % MUSIC.bass.length];
      if(m) musicNote(m, stepMs/1000*1.6, "square", 0.06);
      if(b) musicNote(b, stepMs/1000*1.9, "triangle", 0.10);
      musicStep++;
    }, stepMs);
  }
  function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }

  // ---- 過關獎勵（隨機抽，惡搞反差風）----
  const REWARDS = [
    "📚 5 本練習冊","📝 期末考提前一週","🩴 媽媽的拖鞋 ×3","🍚 再來一碗白飯",
    "🎫 補習券一張（不可退）","😬 班主任的微笑","💨 尊爵不凡空氣一袋","📶 隔壁老王的 WiFi 密碼",
    "💬 已讀不回 ×99","☀️ 週一的早晨","⭐ 一張「再接再厲」貼紙","🔺 多力多滋（就一片）",
    "🧦 只剩單隻的襪子","📉 你的數學成績","🥬 多吃點青菜","🎁 一個空盒子（驚不驚喜）"
  ];
  function pickReward(){ return REWARDS[Math.floor(Math.random()*REWARDS.length)]; }

  // 粒子特效
  function burst(x,y,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=1+Math.random()*3.5;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,
                      life:1,color,size:2+Math.random()*3});
    }
  }
  function updateParticles(){
    for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.vx*=0.96; p.life-=0.035; }
    particles = particles.filter(p=>p.life>0);
  }
  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    }
    ctx.globalAlpha=1;
  }

  // ---- 物理常數 ----
  // 調靈敏：加速更快、轉向更利、第一步立刻動；JUMP 緩衝 + 土狼時間
  const GRAV=0.62, ACCEL=1.5, MAXVX=5.2, FRIC=0.74, TURN=2.4, JUMP=-13.2;
  const JUMP_BUFFER=8, COYOTE=7;   // 跳躍輸入緩衝 / 離地後仍可跳的幀數
  let jumpBuffer=0, coyote=0;

  // 重生玩家（保留關卡狀態）
  function respawnPlayer(){
    player.x=80; player.y=GROUND_Y-60; player.vx=0; player.vy=0;
    player.alive=true; player.win=false; player.face=1; player.rideMover=null;
    camX=0; flyHead=null; fx=null;
    state="play"; overlay.classList.add("hidden");
    updateHUD(); startMusic();
  }
  // 進入第 i 關（重置生命、載入關卡資料）
  function enterLevel(i){ loadLevel(i); lives=3; respawnPlayer(); }
  // 開新局（總分歸零，從第 1 關）
  function startGame(){ totalScore=0; enterLevel(0); }
  document.getElementById("resetBtn").onclick = ()=>{ enterLevel(levelIndex); }; // 重來本關

  // ---- 輸入 ----
  const keyMap = {ArrowLeft:"left",KeyA:"left",ArrowRight:"right",KeyD:"right",
                  ArrowUp:"jump",KeyW:"jump",Space:"jump"};
  addEventListener("keydown",e=>{
    const k=keyMap[e.code]; if(!k) return; e.preventDefault();
    keys[k]=true;
    if(k==="jump"){ if(!keys.jumpHeld) jumpBuffer=JUMP_BUFFER; keys.jumpHeld=true; }
  });
  addEventListener("keyup",e=>{
    const k=keyMap[e.code]; if(!k) return;
    keys[k]=false; if(k==="jump") keys.jumpHeld=false;
  });
  document.querySelectorAll("#touch .tbtn").forEach(b=>{
    const k=b.dataset.k;
    const on=e=>{e.preventDefault();keys[k]=true;if(k==="jump"){ if(!keys.jumpHeld) jumpBuffer=JUMP_BUFFER; keys.jumpHeld=true; }};
    const off=e=>{e.preventDefault();keys[k]=false;if(k==="jump")keys.jumpHeld=false;};
    b.addEventListener("touchstart",on,{passive:false});
    b.addEventListener("touchend",off,{passive:false});
    b.addEventListener("touchcancel",off,{passive:false});
    b.addEventListener("mousedown",on); b.addEventListener("mouseup",off);
    b.addEventListener("mouseleave",off);
  });
  document.getElementById("startBtn").onclick = ()=>{
    audioCtx();
    if(state==="levelclear") enterLevel(levelIndex+1);   // 下一關

  // ---- HUD ----
  function updateHUD(){

    document.getElementById("coins").textContent = coinCount;
    const sc=document.getElementById("score"); if(sc) sc.textContent = totalScore + coinCount*10;
    document.getElementById("lives").textContent = "❤️".repeat(Math.max(0,lives)) || "—";

  // ---- 碰撞輔助：玩家踩地面或平台 ----
  function groundTop(px,pw){
    // 回傳玩家此 x 範圍下方最近可踩的 y（地面或平台頂），找不到回 null
    let top = null;
    // 地面
    if(!(isGap(px) && isGap(px+pw))){
      // 只要不是整段都在坑上，地面有效（簡化：中心點不在坑上）
      if(!isGap(px+pw/2)) top = GROUND_Y;
    }
    return top;
  }

  function update(){
    t++;
    if(state==="dying"){ updateDeath(); return; }
    if(state==="winning"){ updateWin(); return; }
    if(state!=="play") return;
    const p = player;

    // 水平（即時反應）
    const dir = (keys.right?1:0) - (keys.left?1:0);
    if(dir!==0){
      p.face = dir;
      if(dir*p.vx < 0) p.vx += dir*TURN;     // 反向時加倍轉向，更利
      else p.vx += dir*ACCEL;
      if(Math.abs(p.vx) < 1.3) p.vx = dir*1.3; // 第一步立刻有速度，不拖泥帶水
    } else {
      p.vx *= (p.onGround?FRIC:0.92);
      if(Math.abs(p.vx)<0.08) p.vx=0;
    }
    p.vx = Math.max(-MAXVX, Math.min(MAXVX, p.vx));
    p.x += p.vx;
    if(p.x < 0){ p.x=0; p.vx=0; }
    if(Math.abs(p.vx)>0.3 && p.onGround) p.walk += Math.abs(p.vx)*0.06;

    // 鬆開跳躍鍵 → 矮跳（變高度可控）
    if(!keys.jumpHeld && p.vy<-4) p.vy=-4;

    // 重力
    p.vy += GRAV; if(p.vy>16) p.vy=16;
    p.y += p.vy;

    // 移動平台更新（先算出本幀位移 dx/dy，供載人用）
    for(const m of movers){
      m.px=m.x; m.py=m.y;
      const off=Math.sin(t*m.speed+m.phase)*m.amp;
      if(m.axis==="x"){ m.x=m.x0+off; m.y=m.y0; } else { m.x=m.x0; m.y=m.y0+off; }
      m.dx=m.x-m.px; m.dy=m.y-m.py;
    }

    // 與地面 / 平台碰撞（只在下落時著地）
    p.onGround=false; p.rideMover=null;
    const footY = p.y + p.h;
    // 地面
    const gTop = groundTop(p.x, p.w);
    if(gTop!==null && p.vy>=0 && footY>=gTop && footY-p.vy<=gTop+2){
      p.y=gTop-p.h; p.vy=0; p.onGround=true;
    }
    // 平台（單向：由上往下踩）
    for(const pl of platforms){
      if(p.x+p.w>pl.x+4 && p.x<pl.x+pl.w-4){
        if(p.vy>=0 && footY>=pl.y && footY-p.vy<=pl.y+p.vy+2){
          p.y=pl.y-p.h; p.vy=0; p.onGround=true;
        }
      }
    }
    // 移動平台（站上去會被帶著走，含上升時用 |dy| 放寬著地容差）
    for(const m of movers){
      if(p.x+p.w>m.x+4 && p.x<m.x+m.w-4){
        const f=p.y+p.h;
        if(p.vy>=0 && f>=m.y && f-p.vy<=m.y+Math.abs(m.dy)+4){
          p.y=m.y-p.h; p.vy=0; p.onGround=true; p.rideMover=m;
        }
      }
    }

    // 跳躍：土狼時間 + 輸入緩衝（差一兩幀按也算數，跳躍更靈敏可靠）
    if(p.onGround) coyote = COYOTE; else if(coyote>0) coyote--;
    if(jumpBuffer>0) jumpBuffer--;
    if(jumpBuffer>0 && coyote>0){
      p.vy = JUMP; p.onGround=false; coyote=0; jumpBuffer=0; p.rideMover=null; sfx.jump();
    }
    // 站在移動平台上 → 水平被帶著走
    if(p.rideMover && p.onGround){ p.x += p.rideMover.dx; }

    // 尖刺陷阱 → 死亡
    for(const s of spikes){
      if(p.x+p.w>s.x+4 && p.x<s.x+s.w-4 && p.y+p.h>GY-12){ loseLife(); return; }
    }

    // 掉進坑洞 / 出界 → 死亡
    if(p.y > VH + 120){ loseLife(); return; }

    // 金幣
    for(const c of coins){
      if(c.got) continue;
      if(Math.abs((p.x+p.w/2)-c.x)<26 && Math.abs((p.y+p.h/2)-c.y)<30){
        c.got=true; coinCount++; updateHUD(); sfx.coin(); burst(c.x,c.y,"#ffd93d",10);
      }
    }

    // 怪物
    for(const e of enemies){
      if(!e.alive) continue;
      e.x += e.vx;
      if(e.x<e.min||e.x>e.max) e.vx*=-1;
      // 碰撞
      if(p.x+p.w>e.x-e.w/2 && p.x<e.x+e.w/2 &&
         p.y+p.h>e.y-e.h && p.y<e.y){
        if(p.vy>0 && (p.y+p.h)-e.y < 22){
          // 踩到頭頂 → 打倒
          e.alive=false; e.dead=20; p.vy=-9; coinCount+=1; updateHUD();
          sfx.stomp(); burst(e.x,e.y,"#9b4fb5",14);
        } else {
          loseLife(); return;
        }
      }
    } 
    for(const e of enemies) if(!e.alive && e.dead>0) e.dead--;

    // 抵達終點旗
    if(p.x+p.w > goal.x){ win(); }

    // 相機跟隨
    camX = Math.max(0, Math.min(LEVEL_W-VW, p.x - VW*0.38));
    updateHUD();
  }

  function loseLife(){
    if(state==="dying") return;
    sfx.hurt(); stopMusic();
    // 惡搞死亡：頭「啵」一聲彈飛、旋轉升天
    const p=player;
    flyHead = {x:p.x+p.w/2, y:p.y+ (p.h-40), vx:(Math.random()*3-1.5), vy:-12, rot:0, vr:0.32, angel:0};
    burst(p.x+p.w/2, p.y+10, "#ffffff", 18);
    setTimeout(()=>sfx.boing(),40);
    setTimeout(()=>sfx.sadTrombone(),260);
    fx = {mode:"die", t:0, sticker:0};
    state = "dying";
  }
  function updateDeath(){
    fx.t++;
    if(flyHead){
      flyHead.x += flyHead.vx; flyHead.y += flyHead.vy;
      flyHead.vy += 0.5; flyHead.rot += flyHead.vr;
      if(flyHead.y > VH-60){ flyHead.y = VH-60; flyHead.vy *= -0.4; flyHead.vx *= 0.6; }
      if(fx.t>26) flyHead.angel = Math.min(1, (fx.t-26)/20); // 長出光環小翅膀
    }
    if(fx.t===60){ sfx.sticker(); fx.sticker=1; }  // 甩出「再接再厲」貼紙
    if(fx.t>=110){
      lives--; flyHead=null; fx=null;
      if(lives<=0){ state="dead"; showOverlay("dead"); }
      else { loadLevel(levelIndex); respawnPlayer(); }  // 重來本關（新的一條命）
    }
  }

  function win(){
    if(state==="winning") return;
    stopMusic(); sfx.fanfare();
    lastReward = pickReward();
    fx = {mode:"win", t:0, stamp:0};
    state = "winning";
    // 彩虹紙花噴射
    const colors=["#ff5c8a","#ffd93d","#3ddc97","#8aa4ff","#ff9e7d","#a06cd5"];
    for(let i=0;i<70;i++){
      const a=-Math.PI/2 + (Math.random()-0.5)*1.4, sp=4+Math.random()*7;
      particles.push({x:player.x+player.w/2, y:player.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
                      life:1.4, color:colors[i%colors.length], size:3+Math.random()*4});
    }
  }
  function updateWin(){
    fx.t++;
    // 角色慶祝原地小跳
    const p=player;
    if(p.onGround && fx.t%24===0){ p.vy=-7; sfx.coin(); }
    p.vy += GRAV; p.y += p.vy;
    if(p.y+p.h >= GROUND_Y){ p.y=GROUND_Y-p.h; p.vy=0; p.onGround=true; }
    // 持續放煙火
    if(fx.t%26===0){
      sfx.firework();
      const fx2=camX+VW*(0.25+Math.random()*0.5), fy2=VH*(0.2+Math.random()*0.25);
      const colors=["#ff5c8a","#ffd93d","#3ddc97","#8aa4ff"];
      for(let i=0;i<22;i++){ const a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
        particles.push({x:fx2,y:fy2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
                        color:colors[i%colors.length],size:2+Math.random()*3}); }
    }
    if(fx.t===20){ sfx.stamp(); fx.stamp=1; } // 印章砸下
    if(fx.t>=120){
      fx=null;
      // 結算本關分數：詞元×10 + 時間獎勵 + 過關獎勵 500
      const timeSec=(t-levelStartFrame)/60;
      const timeBonus=Math.max(0, Math.round(90 - timeSec)*5);
      totalScore += coinCount*10 + timeBonus + 500;
      if(totalScore>bestScore){ bestScore=totalScore; try{localStorage.setItem("bighead_best",String(bestScore));}catch(e){} }
      if(levelIndex < LEVELS.length-1){ state="levelclear"; showOverlay("levelclear"); }
      else { state="win"; showOverlay("win"); }
    }
  }

  // =================== 繪圖 ===================
  let skyGrad = null;
  function draw(){
    // 天空漸層（快取一次，避免每幀重建）
    if(!skyGrad){
      skyGrad = ctx.createLinearGradient(0,0,0,VH);
      skyGrad.addColorStop(0,"#ffd6a5"); skyGrad.addColorStop(.45,"#ff9e7d"); skyGrad.addColorStop(1,"#a06cd5");
    }
    ctx.fillStyle=skyGrad; ctx.fillRect(0,0,VW,VH);

    // 太陽
    ctx.save();
    ctx.globalAlpha=.85; ctx.fillStyle="#fff2c9";
    ctx.beginPath(); ctx.arc(VW-120,110,56,0,7); ctx.fill();
    ctx.globalAlpha=.18; ctx.beginPath(); ctx.arc(VW-120,110,86,0,7); ctx.fill();
    ctx.restore();

    // 遠山（視差）
    drawHills(camX*0.3, GROUND_Y-30, "#b683d6", 1.0);
    drawHills(camX*0.5, GROUND_Y-10, "#9d6bc4", 1.3);

    // 雲
    ctx.fillStyle="rgba(255,255,255,.85)";
    for(let i=0;i<8;i++){
      const cx=((i*640 - camX*0.4)%(LEVEL_W)) ; const cy=70+ (i%3)*46;
      cloud(cx, cy);
    }

    ctx.save();
    ctx.translate(-camX,0);

    drawGround();
    drawSpikes();
    platforms.forEach(drawPlatform);
    movers.forEach(drawMover);
    coins.forEach(drawCoin);
    drawGoal();
    enemies.forEach(drawEnemy);
    drawParticles();
    if(state==="dying"){ drawCrumpledBody(); drawFlyHead(); }
    else { drawPlayer(); }

    ctx.restore();

    // 螢幕空間特效（不隨鏡頭移動）：印章 / 貼紙 / 關卡概念橫幅
    if(state==="winning") drawWinStamp();
    if(state==="dying")   drawDeathSticker();
    if(state==="play")    drawConceptBanner();
  }

  // 關卡開場概念橫幅（前幾秒淡出）
  function drawConceptBanner(){
    const age = t - levelStartFrame;
    if(age > 260) return;
    const a = age < 200 ? 1 : (260-age)/60;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle="rgba(20,16,40,.72)";
    roundRect(VW*0.5-Math.min(VW*0.46,300), 70, Math.min(VW*0.92,600), 70, 14); ctx.fill();
    ctx.fillStyle="#ffd93d"; ctx.font="bold 22px 'Trebuchet MS',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(levelName, VW*0.5, 92);
    ctx.fillStyle="#fff4e6"; ctx.font="13px 'Trebuchet MS',sans-serif";
    wrapText(levelConcept, VW*0.5, 115, Math.min(VW*0.86,560), 16);
    ctx.restore();
    ctx.textAlign="start"; ctx.textBaseline="alphabetic";
  }
  function wrapText(txt,cx,y,maxW,lh){
    const chars=[...txt]; let line="", yy=y;
    for(const ch of chars){
      if(ctx.measureText(line+ch).width>maxW){ ctx.fillText(line,cx,yy); line=ch; yy+=lh; }
      else line+=ch;
    }
    if(line) ctx.fillText(line,cx,yy);
  }

  // 尖刺陷阱
  function drawSpikes(){
    for(const s of spikes){
      ctx.fillStyle="#cfd6e6";
      for(let x=s.x; x<s.x+s.w-6; x+=14){
        ctx.beginPath(); ctx.moveTo(x,GY); ctx.lineTo(x+7,GY-18); ctx.lineTo(x+14,GY); ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle="#9aa3b8"; ctx.fillRect(s.x,GY,s.w,4);
    }
  }
  // 移動平台
  function drawMover(m){
    ctx.fillStyle="#7c5cff";
    roundRect(m.x,m.y,m.w,18,6); ctx.fill();
    ctx.fillStyle="#5a3fd6"; for(let i=0;i<m.w;i+=22){ ctx.fillRect(m.x+i+4,m.y+11,14,4); }
    ctx.fillStyle="rgba(255,255,255,.3)"; ctx.fillRect(m.x,m.y,m.w,3);
    // 方向箭頭提示
    ctx.fillStyle="rgba(255,255,255,.5)"; ctx.font="11px sans-serif"; ctx.textAlign="center";
    ctx.fillText(m.axis==="x"?"↔":"↕", m.x+m.w/2, m.y+15);
    ctx.textAlign="start";
  }

  // 死亡：身體垮掉（無頭）
  function drawCrumpledBody(){
    const p=player;
    ctx.save();
    ctx.translate(p.x+p.w/2, GROUND_Y);
    ctx.fillStyle="rgba(0,0,0,.18)"; ctx.beginPath(); ctx.ellipse(0,-2,20,5,0,0,7); ctx.fill();
    // 攤平的身體
    ctx.fillStyle="#3ddc97"; roundRect(-16,-16,32,16,7); ctx.fill();
    ctx.fillStyle="#ffc59e"; ctx.fillRect(-22,-12,7,8); ctx.fillRect(15,-12,7,8); // 攤開的手
    ctx.fillStyle="#2e2442"; ctx.fillRect(-12,-4,9,5); ctx.fillRect(3,-4,9,5);
    ctx.restore();
  }
  // 死亡：彈飛旋轉的頭（帶上傳人頭 / 內建臉）+ 升天光環小翅膀
  function drawFlyHead(){
    if(!flyHead) return;
    ctx.save();
    ctx.translate(flyHead.x, flyHead.y);
    // 光環
    if(flyHead.angel>0){
      ctx.globalAlpha=flyHead.angel;
      ctx.strokeStyle="#ffe27a"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.ellipse(0,-26,12,4,0,0,7); ctx.stroke();
      // 小翅膀
      ctx.fillStyle="rgba(255,255,255,.92)";
      ctx.beginPath(); ctx.ellipse(-22,-2,8,12,0.5,0,7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(22,-2,8,12,-0.5,0,7); ctx.fill();
      ctx.globalAlpha=1;
    }
    ctx.rotate(flyHead.rot);
    const R=18;
    if(headImg){
      const iw=headImg.naturalWidth||headImg.width, ih=headImg.naturalHeight||headImg.height;
      const s=Math.min(46/iw,52/ih), dw=iw*s, dh=ih*s;
      ctx.drawImage(headImg,-dw/2,-dh/2,dw,dh);
    } else {
      drawFace(ctx,0,0,R);
    }
    // 暈頭轉向的 X 眼（疊在內建臉上時才畫）
    if(!headImg){
      ctx.strokeStyle="#241734"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-9,-3);ctx.lineTo(-3,3); ctx.moveTo(-3,-3);ctx.lineTo(-9,3);
      ctx.moveTo(3,-3);ctx.lineTo(9,3); ctx.moveTo(9,-3);ctx.lineTo(3,3); ctx.stroke();
    }
    ctx.restore();
  }
  // 死亡：甩出「再接再厲」貼紙（螢幕空間）
  function drawDeathSticker(){
    if(!fx || !fx.sticker) return;
    const prog = Math.min(1,(fx.t-60)/12);
    const sc = 1.25 - 0.25*prog;
    ctx.save();
    ctx.translate(VW*0.5, VH*0.42);
    ctx.rotate(-0.18); ctx.scale(sc,sc);
    ctx.fillStyle="#ff5c8a"; roundRect(-92,-30,184,60,14); ctx.fill();
    ctx.fillStyle="#fff"; ctx.lineWidth=3; ctx.strokeStyle="#fff";
    roundRect(-92,-30,184,60,14); ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="bold 30px 'Trebuchet MS',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("再接再厲！", 0, 2);
    ctx.restore();
    ctx.textAlign="start"; ctx.textBaseline="alphabetic";
  }
  // 過關：「通關!」印章砸下（螢幕空間）
  function drawWinStamp(){
    if(!fx || !fx.stamp) return;
    const prog = Math.min(1,(fx.t-20)/14);
    const sc = 2.2 - 1.2*prog + (prog>=1?Math.sin(fx.t*0.2)*0.02:0);
    ctx.save();
    ctx.translate(VW*0.5, VH*0.3);
    ctx.rotate(-0.12); ctx.scale(sc,sc);
    ctx.globalAlpha = Math.min(1,prog+0.3);
    ctx.lineWidth=5; ctx.strokeStyle="#ff3b3b";
    roundRect(-86,-34,172,68,12); ctx.stroke();
    ctx.fillStyle="#ff3b3b"; ctx.font="bold 44px 'Trebuchet MS',sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("通關!", 0, 2);
    ctx.restore();
    ctx.globalAlpha=1; ctx.textAlign="start"; ctx.textBaseline="alphabetic";
  }

  function drawHills(shift,baseY,color,sc){
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.moveTo(0,VH);
    for(let x=-200;x<VW+200;x+=10){
      const y=baseY - Math.abs(Math.sin((x+shift)*0.004))*90*sc;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(VW,VH); ctx.closePath(); ctx.fill();
  }
  function cloud(x,y){
    ctx.beginPath();
    ctx.arc(x,y,18,0,7); ctx.arc(x+20,y+4,22,0,7);
    ctx.arc(x+44,y,16,0,7); ctx.arc(x+22,y-10,18,0,7);
    ctx.fill();
  }

  function drawGround(){
    const startX = Math.floor(camX/T)*T;
    for(let x=startX; x<camX+VW+T; x+=T){
      if(isGap(x+T/2)) continue;
      // 草皮頂
      ctx.fillStyle="#8fbf5f";
      ctx.fillRect(x, GROUND_Y, T, 10);
      ctx.fillStyle="#6fa343";
      for(let i=0;i<T;i+=8){ ctx.fillRect(x+i, GROUND_Y, 4, 14); }
      // 泥土
      ctx.fillStyle="#7a4a2b"; ctx.fillRect(x, GROUND_Y+10, T, VH-GROUND_Y);
      ctx.fillStyle="rgba(0,0,0,.12)";
      ctx.fillRect(x, GROUND_Y+10, 2, VH-GROUND_Y);
      ctx.fillStyle="#8a5736";
      ctx.fillRect(x+8, GROUND_Y+24, 8, 8); ctx.fillRect(x+24, GROUND_Y+40, 8, 8);
    }
  }

  function drawPlatform(p){
    ctx.fillStyle="#c97b4a";
    roundRect(p.x,p.y,p.w,20,6); ctx.fill();
    ctx.fillStyle="#a85f33";
    for(let i=0;i<p.w;i+=24){ ctx.fillRect(p.x+i+4,p.y+12,16,5); }
    ctx.fillStyle="rgba(255,255,255,.25)";
    ctx.fillRect(p.x,p.y,p.w,4);
  }

  function drawCoin(c){
    if(c.got) return;
    c.t+=0.12;
    const wob = Math.sin(c.t)*0.5+0.5; // 0..1 旋轉
    const w = 6 + wob*16;
    ctx.save();
    ctx.translate(c.x, c.y + Math.sin(c.t*0.6)*3);
    ctx.fillStyle="#ffd93d";
    ctx.beginPath(); ctx.ellipse(0,0,w/2,12,0,0,7); ctx.fill();
    ctx.fillStyle="#ffaa00";
    ctx.beginPath(); ctx.ellipse(0,0,Math.max(1,w/2-3),9,0,0,7); ctx.fill();
    ctx.fillStyle="#fff6c2";
    ctx.fillRect(-1,-7,2,14);
    ctx.restore();
  }

  function drawEnemy(e){
    ctx.save();
    if(!e.alive){
      // 被踩扁
      ctx.translate(e.x,e.y);
      ctx.fillStyle="#7a3b8f";
      ctx.beginPath(); ctx.ellipse(0,e.dead?6:10,e.w/2,Math.max(3,e.dead/2),0,0,7); ctx.fill();
      ctx.restore(); return;
    }
    // 飛行幻覺怪：漂浮幽靈
    if(e.type==="fly"){
      e.wob+=0.12;
      const bob=Math.sin(e.wob)*5;
      ctx.translate(e.x, e.y+bob);
      ctx.globalAlpha=.92; ctx.fillStyle="#7ad0ff";
      ctx.beginPath();
      ctx.arc(0,-2,15,Math.PI,0); // 半圓頂
      ctx.lineTo(15,12);
      for(let i=1;i<=4;i++){ ctx.lineTo(15-i*7.5, 12-(i%2?6:0)); } // 波浪底
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha=1; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(-5,-2,4,0,7); ctx.arc(6,-2,4,0,7); ctx.fill();
      ctx.fillStyle="#1b3a4a";
      const ed=e.vx>0?1.2:-1.2;
      ctx.beginPath(); ctx.arc(-5+ed,-2,2,0,7); ctx.arc(6+ed,-2,2,0,7); ctx.fill();
      ctx.fillStyle="#1b3a4a"; ctx.font="9px sans-serif"; ctx.textAlign="center";
      ctx.fillText("?",0,9); ctx.textAlign="start";
      ctx.restore(); return;
    }
    e.wob+=0.15;
    const bob=Math.sin(e.wob)*2;
    ctx.translate(e.x, e.y-e.h/2+bob);
    // 身體
    ctx.fillStyle="#9b4fb5";
    ctx.beginPath(); ctx.ellipse(0,0,e.w/2,e.h/2,0,0,7); ctx.fill();
    ctx.fillStyle="#7a3b8f";
    ctx.beginPath(); ctx.ellipse(0,e.h/3,e.w/2,e.h/4,0,0,7); ctx.fill();
    // 腳
    ctx.fillStyle="#3a1f47";
    ctx.fillRect(-10,e.h/2-4,8,6); ctx.fillRect(2,e.h/2-4,8,6);
    // 眼睛
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(-6,-4,5,0,7); ctx.arc(6,-4,5,0,7); ctx.fill();
    ctx.fillStyle="#241734";
    const ed = e.vx>0?1.5:-1.5;
    ctx.beginPath(); ctx.arc(-6+ed,-4,2.4,0,7); ctx.arc(6+ed,-4,2.4,0,7); ctx.fill();
    // 眉（生氣）
    ctx.strokeStyle="#241734"; ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(-10,-9); ctx.lineTo(-2,-6); ctx.moveTo(10,-9); ctx.lineTo(2,-6); ctx.stroke();
    ctx.restore();
  }

  function drawGoal(){
    const x=goal.x, top=GROUND_Y-260;
    // 柱
    ctx.fillStyle="#e8e8e8"; ctx.fillRect(x-3, top, 6, 260);
    ctx.fillStyle="#bbb"; ctx.fillRect(x-3, top, 2, 260);
    // 旗
    const fl=Math.sin(t*0.12)*4;
    ctx.fillStyle="#3ddc97";
    ctx.beginPath();
    ctx.moveTo(x+3,top+8);
    ctx.lineTo(x+58+fl,top+24);
    ctx.lineTo(x+3,top+44);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 18px Trebuchet MS";
    ctx.fillText("✓", x+22, top+31);
    // 底座
    ctx.fillStyle="#2a9d6e"; roundRect(x-22,GROUND_Y-18,44,18,4); ctx.fill();
  }

  function drawPlayer(){
    const p=player;
    ctx.save();
    ctx.translate(p.x+p.w/2, p.y);
    const bob = p.onGround ? Math.sin(p.walk)*2 : 0;

    // 影子
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath(); ctx.ellipse(0, p.h+4, 18, 5, 0,0,7); ctx.fill();

    ctx.scale(p.face,1);

    // 腿（走路擺動）
    const legSwing = p.onGround ? Math.sin(p.walk)*6 : 4;
    ctx.fillStyle="#3a2e52";
    ctx.fillRect(-10, p.h-16+bob, 8, 16+legSwing*0); // 固定身高，用 x 擺
    ctx.save();
    ctx.fillStyle="#2e2442";
    ctx.fillRect(-11+legSwing, p.h-14+bob, 9, 16);
    ctx.fillRect(2-legSwing,  p.h-14+bob, 9, 16);
    ctx.fillStyle="#ff5c8a"; // 鞋
    ctx.fillRect(-13+legSwing, p.h+0+bob, 12, 6);
    ctx.fillRect(1-legSwing,  p.h+0+bob, 12, 6);
    ctx.restore();

    // 身體（吊帶褲風格原創）
    ctx.fillStyle="#3ddc97";
    roundRect(-13, p.h-30+bob, 26, 24, 7); ctx.fill();
    ctx.fillStyle="#2bbd80";
    ctx.fillRect(-13, p.h-30+bob, 26, 6);
    // 鈕扣
    ctx.fillStyle="#ffd93d";
    ctx.beginPath(); ctx.arc(-6,p.h-22+bob,2.2,0,7); ctx.arc(6,p.h-22+bob,2.2,0,7); ctx.fill();
    // 手臂
    ctx.fillStyle="#ffc59e";
    ctx.fillRect(-17, p.h-28+bob, 6, 14);
    ctx.fillRect(11,  p.h-28+bob, 6, 14);

    // ===== 人頭（可替換）=====
    const hx=0, hy=p.h-40+bob, R=18;
    ctx.scale(p.face,1); // 還原成正向，避免上傳的臉左右顛倒
    if(headImg){
      // 上傳的人頭：保留原始比例完整顯示（contain），不裁圓、不裁邊
      const iw = headImg.naturalWidth  || headImg.width;
      const ih = headImg.naturalHeight || headImg.height;
      const MW = 50, MH = 60;                 // 人頭最大框（大頭效果）
      const s  = Math.min(MW/iw, MH/ih);
      const dw = iw*s, dh = ih*s;
      const bottomY = p.h-18+bob;             // 臉底貼近領口
      // 落地陰影，讓臉看起來有貼在身體上
      ctx.save();
      ctx.globalAlpha=.18; ctx.fillStyle="#000";
      ctx.beginPath(); ctx.ellipse(0, bottomY-2, dw*0.32, 4, 0, 0, 7); ctx.fill();
      ctx.restore();
      ctx.drawImage(headImg, -dw/2, bottomY-dh, dw, dh);
    } else {
      drawDefaultFace(ctx, hx, hy, R);
    }
    ctx.restore();
  }

  // 內建搞笑表情（全原創手繪），可一鍵切換
  function faceBase(c,x,y,R,skin,hair){
    c.fillStyle=skin; c.beginPath(); c.arc(x,y,R,0,7); c.fill();
    if(hair){ c.fillStyle=hair; c.beginPath(); c.arc(x,y-2,R,Math.PI*1.05,Math.PI*1.95); c.fill(); }
  }
  const presetFaces = [
    // 0 笑臉
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#ffd93d","#e8b800");
      c.fillStyle="#241734"; c.beginPath(); c.arc(x-6,y-1,2.6,0,7); c.arc(x+6,y-1,2.6,0,7); c.fill();
      c.fillStyle="rgba(255,92,138,.5)"; c.beginPath(); c.arc(x-9,y+5,3,0,7); c.arc(x+9,y+5,3,0,7); c.fill();
      c.strokeStyle="#241734"; c.lineWidth=2; c.beginPath(); c.arc(x,y+3,6,0.15*Math.PI,0.85*Math.PI); c.stroke(); },
    // 1 偷笑（瞇眼大笑）
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#ffcf5a","#d99a2b");
      c.strokeStyle="#241734"; c.lineWidth=2.4;
      c.beginPath(); c.arc(x-6,y+1,4,1.1*Math.PI,1.9*Math.PI); c.arc(x+6,y+1,4,1.1*Math.PI,1.9*Math.PI); c.stroke();
      c.fillStyle="rgba(255,92,138,.55)"; c.beginPath(); c.arc(x-10,y+6,3.5,0,7); c.arc(x+10,y+6,3.5,0,7); c.fill();
      c.fillStyle="#241734"; c.beginPath(); c.arc(x,y+7,6,0,Math.PI); c.fill();
      c.fillStyle="#ff5c8a"; c.beginPath(); c.arc(x,y+9,4,0,Math.PI); c.fill(); },
    // 2 墨鏡酷臉
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#f0b27a","#3a2e2e");
      c.fillStyle="#241734"; c.fillRect(x-12,y-4,9,7); c.fillRect(x+3,y-4,9,7); c.fillRect(x-3,y-2,6,2);
      c.fillStyle="rgba(255,255,255,.4)"; c.fillRect(x-11,y-3,3,2); c.fillRect(x+4,y-3,3,2);
      c.strokeStyle="#241734"; c.lineWidth=2; c.beginPath(); c.moveTo(x-5,y+8); c.lineTo(x+5,y+8); c.stroke(); },
    // 3 吐舌
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#ffd93d","#e8b800");
      c.fillStyle="#241734"; c.beginPath(); c.arc(x-6,y-2,2.6,0,7); c.arc(x+6,y-2,2.6,0,7); c.fill();
      c.strokeStyle="#241734"; c.lineWidth=2; c.beginPath(); c.arc(x,y+2,5,0,Math.PI); c.stroke();
      c.fillStyle="#ff5c8a"; c.beginPath(); c.moveTo(x-4,y+5); c.lineTo(x+4,y+5); c.lineTo(x+2,y+12); c.arc(x,y+11,3,0,Math.PI); c.fill(); },
    // 4 震驚
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#fbe6a2","#c9a24b");
      c.fillStyle="#fff"; c.beginPath(); c.arc(x-6,y-2,4,0,7); c.arc(x+6,y-2,4,0,7); c.fill();
      c.fillStyle="#241734"; c.beginPath(); c.arc(x-6,y-2,2,0,7); c.arc(x+6,y-2,2,0,7); c.fill();
      c.fillStyle="#241734"; c.beginPath(); c.ellipse(x,y+7,3.5,5,0,0,7); c.fill();
      c.strokeStyle="#241734"; c.lineWidth=1.6; c.beginPath(); c.moveTo(x-11,y-9); c.lineTo(x-3,y-8); c.moveTo(x+11,y-9); c.lineTo(x+3,y-8); c.stroke(); },
    // 5 生氣
    (c,x,y,R)=>{ faceBase(c,x,y,R,"#ff9e7d","#8a2e1a");
      c.fillStyle="#241734"; c.beginPath(); c.arc(x-6,y,2.4,0,7); c.arc(x+6,y,2.4,0,7); c.fill();
      c.strokeStyle="#241734"; c.lineWidth=2.4; c.beginPath();
      c.moveTo(x-11,y-7); c.lineTo(x-2,y-3); c.moveTo(x+11,y-7); c.lineTo(x+2,y-3); c.stroke();
      c.beginPath(); c.arc(x,y+9,5,1.1*Math.PI,1.9*Math.PI); c.stroke(); }
  ];
  function drawFace(c,x,y,R){ (presetFaces[faceIndex] || presetFaces[0])(c,x,y,R); }
  // 相容舊呼叫名
  function drawDefaultFace(c,x,y,R){ drawFace(c,x,y,R); }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  // ---- 主迴圈 ----
  // 每一幀跑一次更新與繪製，最單純也最順（避免固定步長累積造成的頓挫）。
  function loop(){
    update();
    updateParticles();
    draw();
    requestAnimationFrame(loop);
  }

  // 初始化
  const mt=document.getElementById("menuTip"); if(mt) mt.innerHTML="💡 <b>AI 小知識：</b>"+curTip();
  resize(); loadLevel(0); drawTitleFace(); loop();
})();
</script>
