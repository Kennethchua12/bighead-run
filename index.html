<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大頭登山賽 BigHead Climb</title>
<style>
  :root{
    --sky1:#2b3a67; --sky2:#5b6fa8; --sky3:#f7b267; --grass:#5cc26b; --grass2:#3fa256;
    --dirt:#7a4a2b; --dirt2:#5e3820; --coin:#ffd93d; --accent:#ff5c8a; --accent2:#3ddc97;
    --ink:#16203a; --panel:rgba(16,22,40,.86); --paper:#f3f6ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;background:#0b1020;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:var(--paper)}
  #wrap{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    padding:10px 14px calc(10px+env(safe-area-inset-top,0px));font-weight:bold;pointer-events:none;
    text-shadow:0 2px 0 rgba(0,0,0,.4);z-index:5}
  .stat{display:flex;align-items:center;gap:6px;background:var(--panel);padding:6px 12px;
    border-radius:999px;font-size:15px;backdrop-filter:blur(4px)}
  .stat b{color:var(--coin)}
  #fuelWrap{width:120px;height:14px;background:rgba(0,0,0,.45);border-radius:8px;overflow:hidden;position:relative}
  #fuelBar{position:absolute;inset:0;width:100%;background:linear-gradient(90deg,#3ddc97,#7af0c0);transition:width .1s}
  #spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:999px;touch-action:manipulation;
    font-weight:bold;font-family:inherit;padding:8px 13px;font-size:14px;color:#fff;white-space:nowrap;
    background:var(--accent);box-shadow:0 3px 0 #b8345e;transition:transform .05s}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #b8345e}
  .btn.alt{background:#3a4a78;box-shadow:0 3px 0 #243154}
  .btn.alt:active{box-shadow:0 1px 0 #243154}
  @media(max-width:640px){ #hud{gap:6px;padding:8px 10px} .stat{font-size:13px;padding:5px 9px}
    #fuelWrap{width:84px} .btn .lbl{display:none} .btn{padding:8px 11px;font-size:15px} #spacer{display:none} }

  /* 踏板 */
  #pedals{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;
    padding:18px 22px calc(18px+env(safe-area-inset-bottom));pointer-events:none;z-index:6}
  .pedal{pointer-events:auto;width:92px;height:92px;border-radius:24px;border:none;color:#fff;
    font-size:15px;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}
  .pedal .ic{font-size:30px;line-height:1}
  #brakeP{background:rgba(58,74,120,.92);box-shadow:0 4px 0 #243154}
  #gasP{background:rgba(61,220,151,.95);box-shadow:0 4px 0 #259e6c;color:#06281c}
  .pedal:active{transform:translateY(3px)}
  @media(pointer:coarse){#pedals{display:flex}}

  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;text-align:center;padding:24px;z-index:10;
    background:radial-gradient(circle at 50% 25%,rgba(91,111,168,.4),rgba(11,16,32,.94));backdrop-filter:blur(6px)}
  .overlay.hidden{display:none}
  .overlay h1{font-size:clamp(30px,8vw,60px);line-height:1;
    background:linear-gradient(180deg,#fff,var(--coin));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 0 rgba(0,0,0,.35))}
  .overlay .sub{font-size:clamp(13px,3.3vw,16px);opacity:.92;max-width:520px;line-height:1.6}
  .titleface{width:96px;height:96px;border-radius:20px;border:4px solid var(--paper);object-fit:contain;
    background:rgba(255,255,255,.12);box-shadow:0 6px 0 rgba(0,0,0,.25)}
  .big{font-size:18px;padding:14px 30px;border-radius:14px;box-shadow:0 5px 0 #b8345e}
  .big:active{box-shadow:0 2px 0 #b8345e}
  .tipcard{background:rgba(255,255,255,.08);border:1px dashed var(--coin);border-radius:12px;
    padding:11px 15px;max-width:500px;line-height:1.55;font-size:14px;text-align:left}

  /* 車庫 */
  #garage .gwrap{background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:18px;
    padding:18px;max-width:520px;width:100%;max-height:82vh;overflow:auto}
  .gtitle{font-size:22px;font-weight:bold;margin-bottom:2px}
  .gcoins{color:var(--coin);font-size:16px;margin-bottom:12px}
  .up{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border-radius:12px;
    padding:10px 12px;margin-bottom:8px}
  .up .ico{font-size:26px;width:34px;text-align:center}
  .up .info{flex:1;text-align:left}
  .up .nm{font-weight:bold;font-size:15px}
  .up .ds{font-size:12px;opacity:.75}
  .pips{display:flex;gap:3px;margin-top:4px}
  .pip{width:18px;height:7px;border-radius:3px;background:rgba(255,255,255,.18)}
  .pip.on{background:var(--accent2)}
  .upbtn{border:none;border-radius:10px;font-weight:bold;font-family:inherit;cursor:pointer;
    padding:9px 12px;font-size:13px;color:#06281c;background:var(--coin);box-shadow:0 3px 0 #c9a400;white-space:nowrap}
  .upbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #c9a400}
  .upbtn.max{background:#445;color:#9aa;box-shadow:0 3px 0 #223;cursor:default}
  .hint{font-size:12px;opacity:.7}
  input[type=file]{display:none}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud">
  <div class="stat">🪙 <b id="coins">0</b></div>
  <div class="stat">⛽ <div id="fuelWrap"><div id="fuelBar"></div></div></div>
  <div class="stat">📏 <span id="dist">0</span>m</div>
  <div id="spacer"></div>
  <button class="btn" id="uploadBtn">📷<span class="lbl"> 換頭</span></button>
  <button class="btn alt" id="soundBtn">🔊</button>
  <button class="btn alt" id="retryBtn">↻<span class="lbl"> 重來</span></button>
</div>

<div id="pedals">
  <button class="pedal" id="brakeP"><span class="ic">◀</span>煞車/倒</button>
  <button class="pedal" id="gasP"><span class="ic">▶</span>油門</button>
</div>

<!-- 開始 -->
<div class="overlay" id="startOv">
  <img id="titleFace" class="titleface" alt="">
  <h1>大頭登山賽</h1>
  <div class="sub">踩油門爬過山坡、收集 🪙 金幣、別翻車也別沒油！<br>抵達終點後進<b>車庫改裝</b>你的車。（按「換頭」把駕駛換成你朋友的臉 😎）</div>
  <div class="tipcard" id="startTip"></div>
  <div class="sub" style="opacity:.8">🖥 方向鍵 → 油門、← 煞車/倒車　📱 用下方踏板</div>
  <button class="btn big" id="startBtn">發動引擎 ▶</button>
</div>

<!-- 撞車 / 沒油 -->
<div class="overlay hidden" id="failOv">
  <h1 id="failTitle">💥 翻車了</h1>
  <div class="sub" id="failSub"></div>
  <div class="tipcard" id="failTip"></div>
  <button class="btn big" id="failBtn">再來一次</button>
</div>

<!-- 車庫 -->
<div class="overlay hidden" id="garage">
  <div class="gwrap">
    <div class="gtitle">🏁 抵達終點！進車庫改裝</div>
    <div class="gcoins">🪙 金幣：<b id="gCoins">0</b>（本趟 +<span id="gRun">0</span>）</div>
    <div id="upList"></div>
    <div class="tipcard" id="garageTip" style="margin:10px 0"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px">
      <button class="btn big" id="raceAgain">🚗 再跑一次賺金幣</button>
    </div>
    <div class="hint" style="margin-top:8px">升級會永久保存，車子會越來越猛 💪</div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
(() => {
"use strict";
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");

// ---------- 顯示（滿版自適應）----------
const VH=520; let VW=900, scale=1;
function resize(){
  const w=innerWidth,h=innerHeight,dpr=Math.min(devicePixelRatio||1,2);
  VW=Math.round(VH*w/h);
  canvas.style.width=w+"px"; canvas.style.height=h+"px";
  canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  scale=(h*dpr)/VH; ctx.setTransform(scale,0,0,scale,0,0);
}
addEventListener("resize",resize);
addEventListener("orientationchange",()=>setTimeout(resize,120));

// ---------- 地形（第 1 關：平緩好開）----------
const BASE=360, LEVEL_LEN=5600, FINISH=5400;
function terrain(x){
  if(x<360) return BASE;
  const xx=x-360;
  return BASE - Math.sin(xx*0.0042)*34 - Math.sin(xx*0.0090+1)*12 - Math.sin(xx*0.0021)*40;
}
function terrainSlope(x){ return Math.atan2(terrain(x+6)-terrain(x-6), 12); }

// ---------- 升級資料（存 localStorage）----------
const SAVE={coins:0, engine:0, grip:0, susp:0, fuel:0};
try{ const s=JSON.parse(localStorage.getItem("bighead_climb")||"{}"); Object.assign(SAVE,s); }catch(e){}
function persist(){ try{ localStorage.setItem("bighead_climb", JSON.stringify(SAVE)); }catch(e){} }
const UPGRADES=[
  {key:"engine",ico:"🔧",nm:"引擎馬力",ds:"加速更快、爬坡更猛",max:5,cost:l=>60+l*60},
  {key:"grip",  ico:"🛞",nm:"輪胎抓地",ds:"更快、更不打滑",max:5,cost:l=>50+l*55},
  {key:"susp",  ico:"🪛",nm:"懸吊避震",ds:"落地更穩、不易翻車",max:5,cost:l=>50+l*50},
  {key:"fuel",  ico:"⛽",nm:"油箱容量",ds:"跑更遠、更安心",max:5,cost:l=>40+l*45},
];
// 由升級換算車輛參數
function carStats(){
  return {
    ENG: 0.30 + SAVE.engine*0.045,
    ROLL: 0.034 - SAVE.grip*0.003,      // 阻力越小越快
    C: 0.50 + SAVE.susp*0.05,           // 阻尼越高越穩
    FUEL: 100 + SAVE.fuel*32,
  };
}

// ---------- 車輛物理（剛體 + 雙輪懸吊，已調校）----------
const g=0.46, WB=56, AX=14, R=14, K=0.24, BRK=0.30;
const car={x:120,y:BASE-26,vx:0,vy:0,a:0,av:0,wheelSpin:0,fuel:100};
let stats=carStats();
function rot(lx,ly,a){ return [lx*Math.cos(a)-ly*Math.sin(a), lx*Math.sin(a)+ly*Math.cos(a)]; }
function resetCar(){
  car.x=120; car.y=BASE-26; car.vx=0; car.vy=0; car.a=0; car.av=0; car.wheelSpin=0;
  stats=carStats(); car.fuel=stats.FUEL;
}
function physics(gas,brake){
  // 沒油 → 不能加油門
  const hasFuel = car.fuel>0;
  const G = gas && hasFuel;
  let Fy=g, Fx=0, ground=false, rGY=0, fGY=0;
  for(const [s,lx] of [["r",-WB/2],["f",WB/2]]){
    const [rx,ry]=rot(lx,AX,car.a); const gy=terrain(car.x+rx);
    if(s==="r")rGY=gy; else fGY=gy;
    let pen=(car.y+ry+R)-gy;
    if(pen>0){ ground=true; if(pen>14)pen=14; let N=K*pen + stats.C*car.vy; if(N<0)N=0; if(N>3.2)N=3.2; Fy-=N; }
  }
  if(ground){
    const [fx,fy]=rot(1,0,car.a);
    if(G){ Fx+=fx*stats.ENG; Fy+=fy*stats.ENG; }
    if(brake){ Fx-=fx*BRK; Fy-=fy*BRK; }
    Fx+=-car.vx*stats.ROLL;
  }
  car.vx+=Fx; car.vy+=Fy; car.vx*=0.996; car.vy*=0.999;
  car.x+=car.vx; car.y+=car.vy;
  if(car.x<60){car.x=60;car.vx=0;}
  if(ground){
    const slope=Math.atan2(fGY-rGY,WB);
    car.av += (slope-car.a)*0.13; car.av -= car.av*0.30;
    if(G)car.av-=0.0030; if(brake)car.av+=0.0030;
  } else {
    if(G)car.av-=0.0011; if(brake)car.av+=0.0011; car.av*=0.985;
  }
  car.av=Math.max(-0.07,Math.min(0.07,car.av)); car.a+=car.av;
  car.wheelSpin += car.vx*0.05;
  // 油耗
  if(G) car.fuel-=0.05; else car.fuel-=0.008;
  if(car.fuel<0)car.fuel=0;
  // 撞頭判定
  const [hx,hy]=rot(0,-26,car.a);
  const headDown=(car.y+hy)>terrain(car.x+hx)-2;
  return {ground,headDown};
}

// ---------- 收集物 ----------
let coins=[], cans=[], runCoins=0;
function seedItems(){
  coins=[]; cans=[];
  for(let x=560;x<FINISH-120;x+=170){
    coins.push({x, y:terrain(x)-46-Math.random()*30, got:false, t:Math.random()*6});
  }
  for(let x=1400;x<FINISH-200;x+=1500){
    cans.push({x, y:terrain(x)-50, got:false});
  }
}

// ---------- 狀態 ----------
let state="menu"; // menu | drive | crash | garage
let camX=0, camY=0, t=0, dust=[];
const keys={gas:false,brake:false};

// ---------- 音效 / 音樂（原創合成）----------
let actx=null, muted=false;
function AC(){ if(!actx){const A=window.AudioContext||window.webkitAudioContext; if(A)actx=new A();}
  if(actx&&actx.state==="suspended")actx.resume(); return actx; }
function tone(f,d,ty,v,slide){ if(muted)return; const ac=AC(); if(!ac)return;
  const o=ac.createOscillator(),gn=ac.createGain(); o.type=ty||"square"; o.frequency.value=f;
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,ac.currentTime+d);
  gn.gain.setValueAtTime(v||0.16,ac.currentTime); gn.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+d);
  o.connect(gn);gn.connect(ac.destination); o.start();o.stop(ac.currentTime+d); }
const sfx={
  coin:()=>{tone(880,0.07,"square",0.13);setTimeout(()=>tone(1320,0.1,"square",0.13),55);},
  can:()=>{tone(500,0.1,"triangle",0.16,760);setTimeout(()=>tone(820,0.12,"triangle",0.14),90);},
  crash:()=>{tone(220,0.22,"sawtooth",0.2,60);setTimeout(()=>tone(120,0.28,"sawtooth",0.18,50),120);},
  finish:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.22,"triangle",0.18),i*140));},
  buy:()=>{tone(700,0.08,"square",0.16);setTimeout(()=>tone(1050,0.12,"square",0.16),70);},
};
// 引擎聲：持續振盪器，頻率隨車速/油門
let engOsc=null, engGain=null;
function engineOn(){ const ac=AC(); if(!ac||engOsc)return;
  engOsc=ac.createOscillator(); engGain=ac.createGain();
  engOsc.type="sawtooth"; engOsc.frequency.value=70; engGain.gain.value=0;
  engOsc.connect(engGain); engGain.connect(ac.destination); engOsc.start(); }
function engineUpdate(){ if(!engOsc)return;
  const spd=Math.abs(car.vx);
  const f=60 + spd*16 + (keys.gas?40:0);
  engOsc.frequency.setTargetAtTime(Math.min(f,420), actx.currentTime, 0.05);
  const vol = muted?0 : (state==="drive"? (0.02+ (keys.gas?0.05:0.015)+spd*0.004):0);
  engGain.gain.setTargetAtTime(Math.min(vol,0.12), actx.currentTime, 0.08);
}
function engineOff(){ if(engGain&&actx) engGain.gain.setTargetAtTime(0,actx.currentTime,0.1); }

// ---------- AI 知識卡 ----------
const TIPS=[
 "AI 把每個字拆成「詞元 Token」再換成數字來理解——你打的字，對牠來說是一串數字。",
 "ChatGPT、Claude、Gemini、DeepSeek 都在做同一件事：猜下一個字，是世界最強的「接龍高手」。",
 "AI 有時一本正經亂講，叫「幻覺」——牠太想回答就編了個聽起來合理的答案，重要的事要查證。",
 "AI 的大腦有幾千億個「參數」，像幾千億顆旋鈕，訓練就是慢慢轉到對位置——跟你改裝車一樣，調到最強。",
 "讓 AI 答得好的祕訣：給清楚指令＋例子＋叫牠「一步步想」，這叫「提示工程」。",
 "Claude 是 Anthropic、ChatGPT 是 OpenAI、Gemini 是 Google、DeepSeek 來自中國——不同公司的選手。",
 "AlphaGo 用 AI 打敗世界圍棋冠軍，跟你鑽研最佳出裝、找最優解，是同一種「學習」。",
 "AI 也有記憶上限叫「上下文視窗」，聊太長會忘了前面——像油箱有容量，跑太遠要加油。",
 "訓練大模型要上萬張 GPU 算好幾週，電費貴到嚇人——所以叫「大」模型。",
 "AI 會很有自信地說錯話，聰明用法：當牠超強助手，但關鍵答案自己再確認一次。",
];
let tipIdx=Math.floor(Math.random()*TIPS.length);
function nextTip(){ tipIdx=(tipIdx+1+Math.floor(Math.random()*(TIPS.length-1)))%TIPS.length; return TIPS[tipIdx]; }
function curTip(){ return TIPS[tipIdx]; }

// ---------- 人頭（可上傳）----------
let headImg=null, faceIdx=0;
const fileInput=document.getElementById("fileInput");
fileInput.addEventListener("change",e=>{ const f=e.target.files[0]; if(!f)return;
  const u=URL.createObjectURL(f),im=new Image();
  im.onload=()=>{headImg=im; drawTitleFace(); URL.revokeObjectURL(u);}; im.src=u; });
document.getElementById("uploadBtn").onclick=()=>fileInput.click();
function drawDriverHead(c,x,y,R){
  if(headImg){
    const iw=headImg.naturalWidth||headImg.width, ih=headImg.naturalHeight||headImg.height;
    const s=Math.min((R*2.4)/iw,(R*2.8)/ih), dw=iw*s, dh=ih*s;
    c.drawImage(headImg, x-dw/2, y-dh*0.62, dw, dh);
  } else {
    c.fillStyle="#ffd93d"; c.beginPath(); c.arc(x,y,R,0,7); c.fill();
    c.fillStyle="#e8b800"; c.beginPath(); c.arc(x,y-2,R,Math.PI*1.05,Math.PI*1.95); c.fill();
    c.fillStyle="#241734"; c.beginPath(); c.arc(x-5,y-1,2.4,0,7); c.arc(x+5,y-1,2.4,0,7); c.fill();
    c.strokeStyle="#241734"; c.lineWidth=2; c.beginPath(); c.arc(x,y+2,5,0.15*Math.PI,0.85*Math.PI); c.stroke();
  }
}
function drawTitleFace(){
  const c=document.createElement("canvas"); c.width=c.height=120; const x=c.getContext("2d");
  if(headImg){ const iw=headImg.naturalWidth||headImg.width, ih=headImg.naturalHeight||headImg.height;
    const s=Math.min(120/iw,120/ih),dw=iw*s,dh=ih*s; x.drawImage(headImg,(120-dw)/2,(120-dh)/2,dw,dh);
  } else { drawDriverHead(x,60,66,40); }
  document.getElementById("titleFace").src=c.toDataURL();
}

// ---------- HUD ----------
function updateHUD(){
  document.getElementById("coins").textContent=SAVE.coins;
  document.getElementById("dist").textContent=Math.max(0,Math.round(car.x/40));
  document.getElementById("fuelBar").style.width=Math.max(0,(car.fuel/stats.FUEL*100))+"%";
}

// ---------- 流程 ----------
function startRun(){
  AC(); engineOn();
  resetCar(); seedItems(); runCoins=0; camX=0; camY=car.y-VH*0.5;
  state="drive"; t=0;
  document.getElementById("startOv").classList.add("hidden");
  document.getElementById("failOv").classList.add("hidden");
  document.getElementById("garage").classList.add("hidden");
  updateHUD();
}
function fail(reason){
  if(state!=="drive")return;
  state="crash"; engineOff(); sfx.crash();
  // 灰塵
  for(let i=0;i<20;i++){ const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
    dust.push({x:car.x,y:car.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,c:"#cdbba0",sz:2+Math.random()*3}); }
  setTimeout(()=>{
    nextTip();
    document.getElementById("failTitle").textContent = reason==="fuel"?"⛽ 沒油了":"💥 翻車了";
    document.getElementById("failSub").innerHTML = reason==="fuel"
      ? `跑了 <b>${Math.round(car.x/40)}</b> m，這趟撿了 <b>${runCoins}</b> 金幣。油箱可以在車庫升級！`
      : `跑了 <b>${Math.round(car.x/40)}</b> m，這趟撿了 <b>${runCoins}</b> 金幣。油門別一直催到底，下坡放一下更穩。`;
    document.getElementById("failTip").innerHTML="💡 "+curTip();
    SAVE.coins+=runCoins; persist();
    document.getElementById("failOv").classList.remove("hidden");
  },900);
}
function finishLevel(){
  if(state!=="drive")return;
  state="garage"; engineOff(); sfx.finish();
  SAVE.coins+=runCoins+200; persist();   // 過關獎勵 200
  nextTip();
  document.getElementById("gRun").textContent=runCoins+200;
  document.getElementById("garageTip").innerHTML="💡 <b>AI 小知識：</b>"+curTip();
  renderGarage();
  document.getElementById("garage").classList.remove("hidden");
}
function renderGarage(){
  document.getElementById("gCoins").textContent=SAVE.coins;
  const list=document.getElementById("upList"); list.innerHTML="";
  for(const u of UPGRADES){
    const lv=SAVE[u.key], maxed=lv>=u.max, cost=u.cost(lv);
    const row=document.createElement("div"); row.className="up";
    let pips=""; for(let i=0;i<u.max;i++) pips+=`<span class="pip ${i<lv?'on':''}"></span>`;
    row.innerHTML=`<div class="ico">${u.ico}</div><div class="info"><div class="nm">${u.nm}</div>`+
      `<div class="ds">${u.ds}</div><div class="pips">${pips}</div></div>`+
      (maxed?`<button class="upbtn max">已滿級</button>`
            :`<button class="upbtn" data-k="${u.key}">升級 🪙${cost}</button>`);
    list.appendChild(row);
  }
  list.querySelectorAll(".upbtn:not(.max)").forEach(b=>{
    b.onclick=()=>{ const k=b.dataset.k, u=UPGRADES.find(x=>x.key===k), cost=u.cost(SAVE[k]);
      if(SAVE.coins>=cost && SAVE[k]<u.max){ SAVE.coins-=cost; SAVE[k]++; persist(); sfx.buy(); renderGarage(); }
      else { b.animate([{transform:"translateX(-4px)"},{transform:"translateX(4px)"},{transform:"translateX(0)"}],{duration:180}); }
    };
  });
}
document.getElementById("startBtn").onclick=startRun;
document.getElementById("failBtn").onclick=startRun;
document.getElementById("retryBtn").onclick=()=>{ if(state==="drive"){ engineOff(); state="menu"; } startRun(); };
document.getElementById("raceAgain").onclick=startRun;
document.getElementById("soundBtn").onclick=e=>{ muted=!muted; e.currentTarget.textContent=muted?"🔇":"🔊"; };

// ---------- 輸入 ----------
const keyDown=e=>{ if(e.code==="ArrowRight"||e.code==="KeyD"){keys.gas=true;e.preventDefault();}
  if(e.code==="ArrowLeft"||e.code==="KeyA"){keys.brake=true;e.preventDefault();} };
const keyUp=e=>{ if(e.code==="ArrowRight"||e.code==="KeyD")keys.gas=false;
  if(e.code==="ArrowLeft"||e.code==="KeyA")keys.brake=false; };
addEventListener("keydown",keyDown); addEventListener("keyup",keyUp);
function bindPedal(id,which){ const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[which]=true;}, off=e=>{e.preventDefault();keys[which]=false;};
  el.addEventListener("touchstart",on,{passive:false}); el.addEventListener("touchend",off,{passive:false});
  el.addEventListener("touchcancel",off,{passive:false});
  el.addEventListener("mousedown",on); el.addEventListener("mouseup",off); el.addEventListener("mouseleave",off);
}
bindPedal("gasP","gas"); bindPedal("brakeP","brake");

// ---------- 更新 ----------
function update(){
  t++;
  if(state==="drive"){
    const r=physics(keys.gas,keys.brake);
    // 撞頭 / 翻車
    const flipped=Math.abs(((car.a+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI)>2.05;
    if(r.headDown || (flipped && r.ground)) { fail("crash"); }
    else if(car.fuel<=0 && Math.abs(car.vx)<0.25 && car.x<FINISH){ fail("fuel"); }
    else if(car.x>=FINISH){ finishLevel(); }
    // 收集
    for(const c of coins){ if(c.got)continue;
      if(Math.abs(car.x-c.x)<26 && Math.abs(car.y-c.y)<34){ c.got=true; runCoins++; sfx.coin();
        for(let i=0;i<6;i++){const a=Math.random()*6.28;dust.push({x:c.x,y:c.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2-1,life:1,c:"#ffd93d",sz:2+Math.random()*2});}
        updateHUD(); } }
    for(const c of cans){ if(c.got)continue;
      if(Math.abs(car.x-c.x)<30 && Math.abs(car.y-c.y)<38){ c.got=true; car.fuel=Math.min(stats.FUEL,car.fuel+45); sfx.can(); updateHUD(); } }
    // 輪胎揚塵
    if(keys.gas && Math.abs(car.vx)>1 && t%3===0){
      const [rx,ry]=rot(-WB/2,AX+R,car.a);
      dust.push({x:car.x+rx,y:car.y+ry,vx:-car.vx*0.3-Math.random(),vy:-Math.random()*1.5,life:1,c:"#caa,",sz:2+Math.random()*2,c:"#d8c4a0"});
    }
    updateHUD();
  }
  // 相機
  const tx=car.x - VW*0.34, ty=car.y - VH*0.52;
  camX += (tx-camX)*0.12; camY += (ty-camY)*0.10;
  if(camX<0)camX=0; if(camX>LEVEL_LEN-VW)camX=LEVEL_LEN-VW;
  // 灰塵
  for(const p of dust){ p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.96;p.life-=0.03; }
  dust=dust.filter(p=>p.life>0);
  engineUpdate();
}

// ---------- 繪圖 ----------
let skyGrad=null;
function draw(){
  if(!skyGrad){ skyGrad=ctx.createLinearGradient(0,0,0,VH);
    skyGrad.addColorStop(0,"#2b3a67"); skyGrad.addColorStop(.5,"#5b6fa8"); skyGrad.addColorStop(1,"#f7b267"); }
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,VW,VH);
  // 太陽光暈
  ctx.save(); ctx.globalAlpha=.7; ctx.fillStyle="#ffe9b0";
  ctx.beginPath(); ctx.arc(VW*0.75,120,46,0,7); ctx.fill(); ctx.restore();
  // 遠山視差
  parallax(camX*0.25, VH*0.55, "#41507e", 120, 0.0016);
  parallax(camX*0.45, VH*0.62, "#34406a", 90, 0.0026);

  ctx.save(); ctx.translate(-camX,-camY);
  drawTerrain();
  drawFinish();
  for(const c of coins) if(!c.got) drawCoin(c);
  for(const c of cans) if(!c.got) drawCan(c);
  for(const p of dust){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c; ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz); }
  ctx.globalAlpha=1;
  drawCar();
  ctx.restore();

  if(state==="drive"){ // 翻車警示
    const fl=Math.abs(((car.a+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
    if(fl>1.4){ ctx.fillStyle="rgba(255,80,80,"+Math.min(.5,(fl-1.4))+")"; ctx.fillRect(0,0,VW,VH); }
  }
}
function parallax(shift,baseY,color,amp,fr){
  ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(0,VH);
  for(let x=-100;x<VW+100;x+=12){ const y=baseY-Math.abs(Math.sin((x+shift)*fr))*amp; ctx.lineTo(x,y); }
  ctx.lineTo(VW,VH); ctx.closePath(); ctx.fill();
}
function drawTerrain(){
  const x0=Math.floor(camX-20), x1=camX+VW+20;
  ctx.beginPath(); ctx.moveTo(x0,terrain(x0));
  for(let x=x0;x<=x1;x+=8) ctx.lineTo(x,terrain(x));
  ctx.lineTo(x1,camY+VH+200); ctx.lineTo(x0,camY+VH+200); ctx.closePath();
  ctx.fillStyle="#7a4a2b"; ctx.fill();
  // 草皮
  ctx.beginPath(); ctx.moveTo(x0,terrain(x0));
  for(let x=x0;x<=x1;x+=8) ctx.lineTo(x,terrain(x));
  ctx.lineWidth=12; ctx.strokeStyle="#5cc26b"; ctx.lineJoin="round"; ctx.stroke();
  ctx.lineWidth=4; ctx.strokeStyle="#3fa256"; ctx.stroke();
}
function drawFinish(){
  const x=FINISH, top=terrain(x)-150;
  ctx.fillStyle="#ddd"; ctx.fillRect(x-2,top,4,150);
  // 格旗
  for(let r=0;r<5;r++)for(let cc=0;cc<3;cc++){ ctx.fillStyle=(r+cc)%2?"#222":"#fff"; ctx.fillRect(x+3+cc*12, top+4+r*10, 12,10); }
  ctx.fillStyle="#ffd93d"; ctx.font="bold 16px sans-serif"; ctx.textAlign="center";
  ctx.fillText("FINISH", x+22, top-6); ctx.textAlign="start";
}
function drawCoin(c){ c.t+=0.12; const w=6+(Math.sin(c.t)*0.5+0.5)*14;
  ctx.save(); ctx.translate(c.x,c.y+Math.sin(c.t*0.6)*3);
  ctx.fillStyle="#ffd93d"; ctx.beginPath(); ctx.ellipse(0,0,Math.max(2,w/2),11,0,0,7); ctx.fill();
  ctx.fillStyle="#ffaa00"; ctx.beginPath(); ctx.ellipse(0,0,Math.max(1,w/2-3),8,0,0,7); ctx.fill();
  ctx.restore(); }
function drawCan(c){ ctx.save(); ctx.translate(c.x,c.y+Math.sin(t*0.08+c.x)*2);
  ctx.fillStyle="#e23b3b"; roundRect(-9,-12,18,22,3); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="bold 11px sans-serif"; ctx.textAlign="center"; ctx.fillText("⛽",0,3);
  ctx.textAlign="start"; ctx.restore(); }

function drawCar(){
  ctx.save(); ctx.translate(car.x,car.y); ctx.rotate(car.a);
  // 影子
  // 車身
  ctx.fillStyle="#ff5c8a"; roundRect(-30,-12,60,22,8); ctx.fill();
  ctx.fillStyle="#e23b6e"; roundRect(-30,2,60,8,4); ctx.fill();
  // 駕駛艙
  ctx.fillStyle="#bfe3ff"; roundRect(-12,-22,26,14,6); ctx.fill();
  // 車手頭（可換臉）
  drawDriverHead(ctx, 1, -20, 13);
  // 輪子
  drawWheel(-WB/2, AX); drawWheel(WB/2, AX);
  ctx.restore();
}
function drawWheel(lx,ly){
  ctx.save(); ctx.translate(lx,ly);
  ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(0,0,R,0,7); ctx.fill();
  ctx.fillStyle="#555"; ctx.beginPath(); ctx.arc(0,0,R*0.55,0,7); ctx.fill();
  ctx.save(); ctx.rotate(car.wheelSpin); ctx.strokeStyle="#888"; ctx.lineWidth=2;
  for(let i=0;i<4;i++){ ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(R*0.5,0); ctx.stroke(); }
  ctx.restore();
  ctx.fillStyle="#ffd93d"; ctx.beginPath(); ctx.arc(0,0,3,0,7); ctx.fill();
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ---------- 主迴圈 ----------
function loop(){ update(); draw(); requestAnimationFrame(loop); }

// 初始化
document.getElementById("startTip").innerHTML="💡 <b>AI 小知識：</b>"+curTip();
updateHUD(); drawTitleFace(); resize();
resetCar(); seedItems();
loop();
})();
</script>
